<div class="app-wrapper">
    <nav class="glass main-nav">
        <div class="logo">STELLAR<span>BANK</span></div>
        <div class="nav-links">
            <button class="nav-btn" (click)="scrollTo('services')">Services</button>
            <a routerLink="/api-demo" class="nav-btn">API Demo</a>
            <button class="nav-btn" (click)="startRegistration('customer')">Register</button>
            <button class="nav-btn login-btn" (click)="showAuth = true">Log In</button>
        </div>
    </nav>

    <app-hero *ngIf="!currentUser()" (onLogin)="onLogin($event)" (onRegister)="startRegistration($event)">
    </app-hero>

    <app-dashboard *ngIf="currentUser()"></app-dashboard>

    <form>
        <input type="text" [(ngModel)]="text" name="text">
        <!-- <input type="button" value="Submit "> -->
    </form>

    <!-- <h1>{{text}}</h1> -->

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo">STELLAR<span>BANK</span></div>
                <p>The next generation of digital finance.</p>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Stellar Bank. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <app-test [message]="text"></app-test>
    <app-counter></app-counter>

    <router-outlet></router-outlet>
</div>
